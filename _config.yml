bing_site_verification:

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

permalink: /:title/

pagination:
  enabled: false

collections:
  news:
    defaults:
      layout: post
    output: false
    permalink: /news/:path/

announcements:
  enabled: true
  scrollable: false
  limit:

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include:
  - _pages
exclude:
  - bin
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - purgecss.config.js
keep_files:
  - CNAME
  - .nojekyll
  - .git

plugins:
  - jekyll-email-protect
  - jekyll-link-attributes
  - jekyll/scholar
  - jekyll-sitemap
  - jemoji

defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false

sass:
  style: compressed
  sourcemap: never

display_tags: []
display_categories: []

# -----------------------------------------------------------------------------
# Jekyll Scholar
# -----------------------------------------------------------------------------

scholar:
  last_name: [Nguyen]
  first_name: [Duy]

  style: apa
  locale: en

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  bibtex_filters: [latex, smallcaps, superscript]

  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details

  query: "@*"
  group_by: year
  group_order: descending

enable_publication_badges:
  altmetric: false
  dimensions: false

filtered_bibtex_keywords:
  - abbr
  - abstract
  - arxiv
  - bibtex_show
  - html
  - paper
  - selected
  - supp
  - blog
  - code
  - data
  - poster
  - slides
  - website
  - preview
  - altmetric
  - data_and_code
  - long_author_list
  - team
  - highlighted_author
  - highlight

max_author_limit:
more_authors_animation_delay: 10
enable_publication_thumbnails: true

# -----------------------------------------------------------------------------
# Link attributes and responsive images
# -----------------------------------------------------------------------------

external_links:
  enabled: true
  rel: external nofollow noopener
  target: _blank
  exclude:

imagemagick:
  enabled: false
  widths:
    - 480
    - 800
    - 1400
  input_directories:
    - assets/img/
  input_formats:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".tiff"
  output_formats:
    webp: "-resize 800x"

# -----------------------------------------------------------------------------
# Optional features
# -----------------------------------------------------------------------------

enable_google_analytics: false
enable_cronitor_analytics: false
enable_google_verification: false
enable_bing_verification: false
enable_masonry: false
enable_math: true
enable_tooltips: false
enable_darkmode: true
enable_navbar_social: true
enable_project_categories: false
enable_course_categories: false
enable_medium_zoom: true
enable_progressbar: true

